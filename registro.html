<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Livraria Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Reutilizando EXATAMENTE os mesmos estilos do login para consistência visual */
        :root {
            --primary-color: #1e4ca5;    
            --secondary-color: #4f7bdb;  
            --light-green: #eef4ff;      
            --dark-text: #102a55;        
            --light-text: #5a6f95;      
            --white: #ffffff;
            --border-color: #d2deed;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8faff;
            color: var(--dark-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            background-color: var(--white);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(30, 76, 165, 0.05);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header i {
            font-size: 40px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .auth-header h2 {
            font-size: 24px;
            color: var(--dark-text);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--light-text);
        }

        .input-icon-wrapper input {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-icon-wrapper input:focus {
            border-color: var(--primary-color);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--secondary-color);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--light-text);
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            color: var(--light-text);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-home:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div>
        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Voltar para a loja</a>
        
        <div class="auth-container">
            <div class="auth-header">
                <i class="fa-solid fa-user-plus"></i>
                <h2>Crie sua Conta</h2>
            </div>

            <form onsubmit="realizarCadastro(event)">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="nome" placeholder="Seu nome" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-icon-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Crie uma senha forte" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Cadastrar</button>
            </form>

            <div class="auth-footer">
                Já tem uma conta? <a href="LOGIN.html">Faça login</a>
            </div>
        </div>
    </div>

    <script>
        function realizarCadastro(event) {
            event.preventDefault();
            alert("Cadastro realizado com sucesso!");
            window.location.href = "LOGIN.html"; // Redireciona para o login após cadastrar
        }
    </script>
</body>
</html>
